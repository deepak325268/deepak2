<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Questions — Rotation Preview</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b0b0d;color:#e4e4e7;font-family:system-ui,sans-serif;padding:16px;max-width:780px;margin:0 auto}
  h1{font-size:19px;margin-bottom:4px}
  p.sub{color:#9ca3af;font-size:13px;margin-bottom:14px;line-height:1.5}
  .status{font-size:13px;color:#a1a1aa;margin-bottom:16px}
  .controls{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  select,input{background:#151517;color:#e4e4e7;border:1px solid #3f3f46;border-radius:8px;padding:8px 10px;font-size:13px}
  button.main{background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;font-weight:600}
  button.main:hover{background:#4338ca}

  .chapter{background:#151517;border:1px solid #27272a;border-radius:12px;padding:14px;margin-bottom:12px}
  .chapter-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .chapter-name{font-weight:700;font-size:15px}
  .chapter-meta{font-size:12px;color:#9ca3af}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #27272a;vertical-align:top}
  th{color:#9ca3af;font-weight:600}
  .day-label{white-space:nowrap;font-weight:600}
  .today-row{background:rgba(79,70,229,0.12)}
  .qnums{color:#4ade80}
  .empty{color:#71717a;font-style:italic}
</style>
</head>
<body>

<h1>🔁 Important Questions — Rotation Preview</h1>
<p class="sub">
  Dekho kaunse important questions kaunse din dikhenge (app jaisa hi rotation formula use karke).
  Koi guessing/calculation manually nahi karni padegi.
</p>

<div class="controls">
  <label style="font-size:13px;color:#9ca3af">Kitne din aage dikhaein:</label>
  <select id="daysSelect">
    <option value="3">3 din</option>
    <option value="7" selected>7 din</option>
    <option value="14">14 din</option>
  </select>
  <button class="main" onclick="run()">🔄 Load</button>
</div>

<div class="status" id="status">"Load" dabao shuru karne ke liye.</div>
<div id="chapters"></div>

<script>
const FIREBASE_URL = "https://bpsc-sachin-sir-revise-default-rtdb.asia-southeast1.firebasedatabase.app";

// index.html jaisa hi — bilkul same formula, taaki result guaranteed match kare
function willShowToday(q, dayNum) {
  const freq = q.freq || 2;
  const actualFreq = (freq === 1) ? 1 : (freq + 1);
  return dayNum % actualFreq === q.num % actualFreq;
}

function dayNumFor(date) {
  const start = new Date('2024-01-01');
  const d = new Date(date); d.setHours(0,0,0,0);
  return Math.floor((d - start) / 86400000);
}

function dayLabel(offset) {
  if (offset === 0) return "Aaj";
  if (offset === 1) return "Kal";
  if (offset === 2) return "Parso";
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

async function run() {
  const statusEl = document.getElementById('status');
  const container = document.getElementById('chapters');
  container.innerHTML = '';
  statusEl.textContent = "Firebase se important-questions fetch ho rahi hain...";

  let qs;
  try {
    const res = await fetch(FIREBASE_URL + "/questionBank/files/important-questions.json?v=" + Date.now());
    qs = await res.json();
  } catch (e) {
    statusEl.textContent = "❌ Fetch error: " + e.message;
    return;
  }
  if (!Array.isArray(qs) || qs.length === 0) {
    statusEl.textContent = "⚠️ Koi important questions nahi mile.";
    return;
  }

  const numDays = parseInt(document.getElementById('daysSelect').value);

  // Chapter-wise group karo
  const byChapter = {};
  qs.forEach(q => {
    const key = (q._subject || '?') + ' — ' + (q._chapter || 'Other');
    if (!byChapter[key]) byChapter[key] = [];
    byChapter[key].push(q);
  });

  statusEl.textContent = `${qs.length} important questions, ${Object.keys(byChapter).length} chapters mile.`;

  Object.keys(byChapter).sort().forEach(chKey => {
    const chQs = byChapter[chKey];
    const div = document.createElement('div');
    div.className = 'chapter';

    let rowsHTML = '';
    for (let offset = 0; offset < numDays; offset++) {
      const d = new Date(); d.setDate(d.getDate() + offset);
      const dNum = dayNumFor(d);
      const showing = chQs.filter(q => willShowToday(q, dNum)).map(q => q.num).sort((a,b)=>a-b);
      rowsHTML += `
        <tr class="${offset === 0 ? 'today-row' : ''}">
          <td class="day-label">${dayLabel(offset)}</td>
          <td>${showing.length ? '<span class="qnums">Q: ' + showing.join(', ') + '</span>' : '<span class="empty">koi nahi</span>'}</td>
        </tr>`;
    }

    div.innerHTML = `
      <div class="chapter-head">
        <div class="chapter-name">${chKey}</div>
        <div class="chapter-meta">${chQs.length} important questions marked</div>
      </div>
      <table>
        <tr><th>Din</th><th>Kaunse Q dikhenge</th></tr>
        ${rowsHTML}
      </table>
    `;
    container.appendChild(div);
  });
}
</script>
</body>
</html>
